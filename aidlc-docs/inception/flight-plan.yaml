mode: greenfield
requirements:
- key: cloud_target
  state: ready
  value: aws
- key: integration_strategy
  state: ready
  value: SPA in-repo at web-spa/; Vite dev-proxy to localhost API; prod served same-origin
    via FastAPI StaticFiles; no CORS, no backend edits until gated
- key: non_goals
  state: ready
  value: auth/login, multi-user/RBAC, mobile — localhost single-operator only
- key: personas
  state: ready
  value: Single Operator persona with six modes; no auth/RBAC in v1
- key: read_only_constraint
  state: ready
  value: No repo modification; port plan authored for operator to run in ~/repos/Mission-Control
- key: screen_endpoint_map
  state: ready
  value: 'Each htmx template maps to a React view over existing endpoints: Fleet→GET
    /runs,/targets; Metrics→GET /metrics; Launch→POST /runs; Run station→GET /runs/{id},/changes,/events(SSE),POST
    approve/reject/scrub/cancel; Plan list→GET/POST /plans; Planner→GET /plans/{id},POST
    /turns,/turns/stream(SSE),/finalize'
- key: sse_consumption
  state: ready
  value: React EventSource over /runs/{id}/events and /plans/{id}/turns/stream JSON-event
    feeds
- key: stories
  state: ready
  value: 8 build-ready stories mapped 1:1 to six units
- key: type_generation
  state: ready
  value: openapi-typescript run against live /openapi.json (not templates) for typed
    client
